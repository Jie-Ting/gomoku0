<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>五子棋連線</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">五子棋連線</div>
          <div class="subtitle">輸入房間號碼，雙人連線對戰</div>
        </div>
        <div class="status" id="status">尚未連線</div>
      </header>

      <main class="main">
        <section class="panel">
          <div class="row">
            <label class="label" for="roomCode">房間號碼</label>
            <input
              id="roomCode"
              class="input"
              inputmode="numeric"
              autocomplete="off"
              placeholder="例如 123456"
              maxlength="6"
            />
          </div>
          <div class="buttons">
            <button class="btn primary" id="btnCreate" type="button">建立房間</button>
            <button class="btn" id="btnSearch" type="button">搜尋</button>
            <button class="btn" id="btnJoin" type="button">加入</button>
          </div>

          <div class="roomline">
            <div class="pill" id="pillRoom">房間：—</div>
            <div class="pill" id="pillYou">你：—</div>
            <div class="pill" id="pillTurn">回合：—</div>
          </div>

          <div class="buttons">
            <button class="btn" id="btnNewGame" type="button" disabled>新對局</button>
            <button class="btn danger" id="btnLeave" type="button" disabled>離開</button>
          </div>

          <div class="log" id="log" aria-live="polite"></div>
        </section>

        <section class="boardWrap">
          <canvas id="board" width="720" height="720"></canvas>
          <div class="hint" id="hint">點擊棋盤落子</div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
